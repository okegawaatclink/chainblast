<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CHAIN BLAST</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d0d14;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; font-family:monospace; color:#fff;
  user-select:none; overflow:hidden;
}
#chain { height:36px; font-size:clamp(22px, 6.2vw, 32px); font-weight:bold; color:#f70;
  letter-spacing:4px; text-shadow:0 0 14px #f70; margin-bottom:4px; }
#hud { margin-bottom:2px; font-size:clamp(10px, 3.4vw, 14px); letter-spacing:1px; color:#bbb; }
#stats { margin-bottom:6px; font-size:clamp(9px, 3.2vw, 13px); letter-spacing:1px; color:#9aa; }
canvas { display:block; cursor:crosshair; border:1px solid #222; touch-action:none; }
#msg { margin-top:6px; font-size:11px; color:#666; min-height:14px; letter-spacing:1px; }
</style>
</head>
<body>
<div id="chain"></div>
<div id="hud">WAVE <span id="wv">01</span>/20&nbsp;SCORE<span id="sc">000000</span>&nbsp;BEST<span id="bst">000000</span></div>
<div id="stats">x<span id="mul">1.0</span>&nbsp;AIM<span id="aim">10</span>&nbsp;BNC<span id="bnc">3</span> &nbsp;BLAST<span id="rng">2.15</span></div>
<canvas id="c"></canvas>
<div id="msg"></div>
<script>
// ================================================================
//  CANVAS
// ================================================================
var CV = document.getElementById('c');
var CX = CV.getContext('2d');
var W = 360, H = 640;
CV.width = W; CV.height = H;

var domChain = document.getElementById('chain');
var domWave  = document.getElementById('wv');
var domScore = document.getElementById('sc');
var domBest  = document.getElementById('bst');
var domMsg   = document.getElementById('msg');
var domVer   = document.getElementById('vernum');
var domMul   = document.getElementById('mul');
var domAim   = document.getElementById('aim');
var domBnc   = document.getElementById('bnc');
var domRng   = document.getElementById('rng');
var usePointer = !!window.PointerEvent;
var activeTouchId = null;
var activePointerId = null;

function getPos(ev) {
  var r=CV.getBoundingClientRect();
  var sx = W / r.width;
  var sy = H / r.height;
  if (ev.touches && ev.touches.length) {
    return { x: (ev.touches[0].clientX - r.left) * sx, y: (ev.touches[0].clientY - r.top) * sy };
  }
  if (ev.changedTouches && ev.changedTouches.length) {
    return { x: (ev.changedTouches[0].clientX - r.left) * sx, y: (ev.changedTouches[0].clientY - r.top) * sy };
  }
  return { x: (ev.clientX - r.left) * sx, y: (ev.clientY - r.top) * sy };
}

function getTouchPos(ev, id) {
  var r=CV.getBoundingClientRect();
  var sx = W / r.width;
  var sy = H / r.height;
  var list = ev.touches && ev.touches.length ? ev.touches : ev.changedTouches;
  if (!list || !list.length) return null;
  for (var i=0; i<list.length; i++) {
    if (list[i].identifier === id) {
      return { x: (list[i].clientX - r.left) * sx, y: (list[i].clientY - r.top) * sy };
    }
  }
  return null;
}

function aimAngleFromX(x) {
  var BX = LX, BY = LY - 28;
  var r = 70;
  var t = clamp((x - (BX - r)) / (2*r), 0, 1);
  return Math.PI * (1 - t); // left=PI, right=0
}

function resizeCanvasToFit() {
  var hudH = document.getElementById('hud').getBoundingClientRect().height;
  var statsH = document.getElementById('stats').getBoundingClientRect().height;
  var chainH = domChain.getBoundingClientRect().height;
  var msgH = domMsg.getBoundingClientRect().height;
  var pad = 0;
  var availW = window.innerWidth;
  var availH = window.innerHeight - (hudH + statsH + chainH + msgH + pad*2);
  var scale = Math.max(0.1, Math.min(availW / W, availH / H));
  CV.style.width = (W * scale) + 'px';
  CV.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvasToFit);

// ================================================================
//  CONSTANTS
// ================================================================
var ROW_H     = 44;
var FLOOR_Y   = H - 95;                         // game-over line Y
var MAX_ROWS  = Math.floor((FLOOR_Y - 30) / ROW_H);
var FLOOR_ROW = MAX_ROWS - 1;
var LX        = W / 2;
var LY        = H - 38;                          // launcher center Y
var DROP_SEC  = 0.42;
var MAX_WAVE  = 20;
var BR        = 6;                               // bullet radius
var AIM_STEPS   = 10;                            // エイムガイドラインのステップ数
var MAX_BOUNCES  = 3;                            // 弾の最大反射回数
var EXPL_R_MULT  = 2.15;                         // 誘爆範囲倍率（敵半径 × この値）
var OIL_R        = 40;                           // オイル付与半径
var OIL_MAX      = 4;                            // オイル最大スタック数
var OIL_BOOST    = 12;                           // スタックごとの誘爆範囲増加
// 弾種切替ボタン領域（AIMフェーズ）
var SHOT_BTNS = {
  fire: {x: 8,     y: H-26, w: 74, h: 20},
  oil:  {x: W-82,  y: H-26, w: 74, h: 20}
};
var ENEMY_MARGIN = 28;
var ENEMY_SPACING = 44;

// 敵タイプ定義
var ETYPES = {
  s: { r:13, hp:1, color:'#4db',  dark:'#1a4a4a', label:'s' },  // 小型スライム
  m: { r:18, hp:2, color:'#e85',  dark:'#4a2010', label:'m' },  // 中型モンスター
  l: { r:24, hp:3, color:'#a4c',  dark:'#3a1050', label:'l' },  // 大型ボス
};

function rowY(row) { return 30 + row * ROW_H + 20; }

// ================================================================
//  STATE
// ================================================================
var phase;
var enemies, items, sparks, floatTexts, bul;
var score, bestScore = 0, wave, chainCnt, shakeT, turnStartScore;
var scoreMul;
var dropT, dropList;
var mouse = { x: W/2, y: LY-60, dn: false, sx: W/2, sy: LY-60, hasStart:false };
var curBounces, penaltyNextTurn=false, penaltyActive=false, turnKills=0;
// プレイヤーキャラアニメ
var playerAnim = { shotT: 0, shooting: false };
var playerImg = new Image();
playerImg.src = 'player.png';
var selectOptions = null;
var selectRects = null;
var prevPhase = null;
var shotType = 'fire'; // 'fire' | 'oil'

// ================================================================
//  HELPERS
// ================================================================
function rnd(a,b) { return a + Math.random()*(b-a); }
function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }
function dst(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }
function setMsg(s) { domMsg.textContent = s; }
function updateHUD() {
  domWave.textContent  = wave+'/'+MAX_WAVE;
  domScore.textContent = score;
  domBest.textContent  = bestScore;
  domMul.textContent   = scoreMul.toFixed(1);
  domAim.textContent   = AIM_STEPS;
  domBnc.textContent   = curBounces;
  domRng.textContent   = EXPL_R_MULT.toFixed(2);
}

function makeEnemy(x, row, type) {
  var tp = ETYPES[type];
  return {
    x:x, y:rowY(row), row:row,
    type:type, r:tp.r, maxHp:tp.hp, hp:tp.hp,
    explR: tp.r * EXPL_R_MULT,
    st:'n',
    ignT:0, xplT:0, lv:0,
    pt: Math.random()*6.28,
    hitCool:0, oilCool:0,
    blinkT:0, oil:0,
  };
}

var ITEM_EFFECTS = ['aim', 'bounce', 'explr', 'score'];
function makeItem(x, row) {
  return { x:x, y:rowY(row), row:row, r:13, st:'n', xplT:0, pt:Math.random()*6.28, ttl:3 };
}

// ================================================================
//  INIT
// ================================================================
function init() {
  enemies=[]; items=[]; sparks=[]; floatTexts=[]; bul=null;
  score=0; wave=0; chainCnt=0; shakeT=0; scoreMul=1.0;
  AIM_STEPS=10; MAX_BOUNCES=3; EXPL_R_MULT=2.15;
  curBounces=MAX_BOUNCES; penaltyNextTurn=false; penaltyActive=false; turnKills=0;
  dropT=0; dropList=[];
  selectOptions=null; selectRects=null; prevPhase=null;
  shotType='fire';
  domChain.textContent='';
  setMsg(''); updateHUD();
  resizeCanvasToFit();
  nextWave();
}

// ================================================================
//  WAVE LOGIC
// ================================================================
function maxSpawnSlots() {
  return Math.max(2, Math.floor((W - ENEMY_MARGIN*2) / ENEMY_SPACING) + 1);
}
function enemyCount(w) {
  var maxEnemies = Math.max(1, maxSpawnSlots() - 1); // leave 1 slot for item
  return Math.min(2+w, maxEnemies);
}

function pickType(w) {
  // waveが進むほど大型が増える
  var r = Math.random();
  if (w <= 2)  return r < 0.7 ? 's' : 'm';
  if (w <= 5)  return r < 0.4 ? 's' : r < 0.8 ? 'm' : 'l';
  return r < 0.2 ? 's' : r < 0.6 ? 'm' : 'l';
}

function randomXPositions(n) {
  var margin = ENEMY_MARGIN, xs = [], tries = 0;
  while (xs.length < n && tries < 3000) {
    tries++;
    var x = rnd(margin, W-margin);
    var ok = true;
    for (var j=0; j<xs.length; j++) {
      if (Math.abs(xs[j]-x) < ENEMY_SPACING) { ok=false; break; }
    }
    if (ok) xs.push(x);
  }
  return xs;
}

function nextWave() {
  wave++; chainCnt=0;
  domChain.textContent='';

  if (wave > MAX_WAVE) {
    wave = MAX_WAVE;
    if (score>bestScore) bestScore=score;
    updateHUD(); phase='clear'; return;
  }

  var n  = enemyCount(wave);
  var dl = [];

  // 既存の敵・アイテムを1行下へ
  for (var i=0; i<enemies.length; i++) {
    var en=enemies[i];
    if (en.st==='d') continue;
    var nr=en.row+1;
    dl.push({en:en, row1:nr, y0:en.y, y1:rowY(nr)});
  }
  for (var i=0; i<items.length; i++) {
    var it=items[i];
    if (it.st==='d') continue;
    var nr=it.row+1;
    dl.push({en:it, row1:nr, y0:it.y, y1:rowY(nr)});
  }

  // 新しい敵を上から（+1でアイテム分のX座標を確保）
  var xs = randomXPositions(n + 1);
  if (xs.length < n + 1) n = Math.max(0, xs.length - 1);
  for (var i=0; i<n; i++) {
    var tp  = pickType(wave);
    var en  = makeEnemy(xs[i], 0, tp);
    var sy  = rowY(-1) - i*10;
    en.y    = sy;
    dl.push({en:en, row1:0, y0:sy, y1:rowY(0)});
    enemies.push(en);
  }
  // アイテムを1つ追加
  if (xs.length > 0) {
    var it = makeItem(xs[n] || xs[xs.length-1], 0);
    it.y = rowY(-1);
    dl.push({en:it, row1:0, y0:it.y, y1:rowY(0)});
    items.push(it);
  }

  dropList=dl; dropT=0; phase='drop';
  dropList._cb=null;
}

function checkGameOver() {
  for (var i=0; i<enemies.length; i++) {
    var e=enemies[i];
    if (e.st==='d') continue;
    if (e.row >= FLOOR_ROW) return true;
  }
  return false;
}

function endTurn() {
  var alive=[];
  for (var i=0; i<enemies.length; i++) {
    if (enemies[i].st!=='d') alive.push(enemies[i]);
  }
  enemies=alive;
  // アイテム寿命を消費（未取得のみ）
  for (var i=0; i<items.length; i++) {
    var it=items[i];
    if (it.st==='n') {
      it.ttl--;
      if (it.ttl<=0) it.st='d';
    }
  }
  var aliveItems=[];
  for (var i=0; i<items.length; i++) {
    if (items[i].st!=='d') aliveItems.push(items[i]);
  }
  items=aliveItems;
  if (turnKills===0) penaltyNextTurn=true;
  // 全消しボーナス：フィールドの敵が0ならスコア2倍
  if (alive.length===0 && turnKills>0) {
    var bonus = score - turnStartScore;
    score += bonus;
    if (score>bestScore) bestScore=score;
    updateHUD();
    floatTexts.push({x:W/2, y:H/2, text:'全消し！ ×2', life:1.4});
    shakeT=0.3;
  }
  if (checkGameOver()) {
    if (score>bestScore) bestScore=score;
    updateHUD(); phase='over'; return;
  }
  nextWave();
}

// ================================================================
//  INPUT
// ================================================================
CV.addEventListener('mousedown', function(ev) {
  if (usePointer) return;
  var p=getPos(ev);
  mouse.x=p.x; mouse.y=p.y;
  if (phase==='select') {
    handleSelectClick(mouse.x, mouse.y);
    return;
  }
  if (phase==='aim') {
    if (checkShotBtn(mouse.x, mouse.y)) return;
    mouse.dn=true;
    mouse.sx=mouse.x; mouse.sy=mouse.y; mouse.hasStart=true;
  }
  if (phase==='over'||phase==='clear') init();
});
CV.addEventListener('mousemove', function(ev) {
  if (usePointer) return;
  var p=getPos(ev);
  mouse.x=p.x; mouse.y=p.y;
});
window.addEventListener('mouseup', function(ev) {
  if (usePointer) return;
  if (!mouse.dn) return;
  mouse.dn=false;
  if (!mouse.hasStart) return;
  if (phase!=='aim') return;
  var p=getPos(ev);
  var mx=p.x, my=p.y;
  var BX = LX, BY = LY - 28;
  var ang = aimAngleFromX(mx);
  var spd = 12;
  bul={x:BX, y:BY, vx:Math.cos(ang)*spd, vy:-Math.sin(ang)*spd, r:BR, wallHits:0, type:shotType};
  phase='bullet'; setMsg('');
  playerAnim.shooting=true; playerAnim.shotT=0;
  mouse.hasStart=false;
});

// touch support
CV.addEventListener('touchstart', function(ev) {
  if (usePointer) return;
  ev.preventDefault();
  if (activeTouchId!==null) return;
  activeTouchId = ev.touches[0].identifier;
  var p=getTouchPos(ev, activeTouchId) || getPos(ev);
  mouse.x=p.x; mouse.y=p.y;
  if (phase==='select') {
    handleSelectClick(mouse.x, mouse.y);
    return;
  }
  if (phase==='aim') {
    if (checkShotBtn(mouse.x, mouse.y)) return;
    mouse.dn=true;
    mouse.sx=mouse.x; mouse.sy=mouse.y; mouse.hasStart=true;
  }
  if (phase==='over'||phase==='clear') init();
}, { passive:false });
CV.addEventListener('touchmove', function(ev) {
  if (usePointer) return;
  ev.preventDefault();
  if (activeTouchId===null) return;
  var p=getTouchPos(ev, activeTouchId);
  if (!p) return;
  mouse.x=p.x; mouse.y=p.y;
}, { passive:false });
window.addEventListener('touchend', function(ev) {
  if (usePointer) return;
  if (!mouse.dn) return;
  ev.preventDefault();
  mouse.dn=false;
  if (!mouse.hasStart) return;
  var id = activeTouchId;
  activeTouchId = null;
  if (phase!=='aim') return;
  var p=getTouchPos(ev, id) || getPos(ev);
  var mx=p.x, my=p.y;
  var BX = LX, BY = LY - 28;
  var ang = aimAngleFromX(mx);
  var spd = 12;
  bul={x:BX, y:BY, vx:Math.cos(ang)*spd, vy:-Math.sin(ang)*spd, r:BR, wallHits:0, type:shotType};
  phase='bullet'; setMsg('');
  playerAnim.shooting=true; playerAnim.shotT=0;
  mouse.hasStart=false;
}, { passive:false });
window.addEventListener('touchcancel', function(ev) {
  if (usePointer) return;
  activeTouchId = null;
  mouse.dn=false;
}, { passive:false });

if (usePointer) {
  CV.addEventListener('pointerdown', function(ev) {
    ev.preventDefault();
    if (activePointerId!==null) return;
    activePointerId = ev.pointerId;
    var p=getPos(ev);
    mouse.x=p.x; mouse.y=p.y;
    if (phase==='select') {
      handleSelectClick(mouse.x, mouse.y);
      return;
    }
    if (phase==='aim') {
      if (checkShotBtn(mouse.x, mouse.y)) return;
      mouse.dn=true;
      mouse.sx=mouse.x; mouse.sy=mouse.y; mouse.hasStart=true;
    }
    if (phase==='over'||phase==='clear') init();
  });
  CV.addEventListener('pointermove', function(ev) {
    ev.preventDefault();
    if (activePointerId!==ev.pointerId) return;
    var p=getPos(ev);
    mouse.x=p.x; mouse.y=p.y;
  });
  window.addEventListener('pointerup', function(ev) {
    if (activePointerId!==ev.pointerId) return;
    activePointerId = null;
    if (!mouse.dn) return;
    ev.preventDefault();
    mouse.dn=false;
    if (!mouse.hasStart) return;
    if (phase!=='aim') return;
    var p=getPos(ev);
    var mx=p.x, my=p.y;
    var BX = LX, BY = LY - 28;
    var ang = aimAngleFromX(mx);
    var spd = 12;
    bul={x:BX, y:BY, vx:Math.cos(ang)*spd, vy:-Math.sin(ang)*spd, r:BR, wallHits:0, type:shotType};
    phase='bullet'; setMsg('');
    playerAnim.shooting=true; playerAnim.shotT=0;
    mouse.hasStart=false;
  });
  window.addEventListener('pointercancel', function(ev) {
    activePointerId = null;
    mouse.dn=false;
  });
}

// ================================================================
//  SPARKS
// ================================================================
function addExplosion(x,y,lv,tp) {
  var pal = tp==='s'   ?['#4df','#0ff','#acf']:
            tp==='m'   ?['#f80','#fb0','#f30']:
            tp==='item'?['#ff0','#fff','#fa0','#ffd']:
                        ['#d4f','#a0f','#f4d','#fff'];
  for (var i=0; i<22+lv*5; i++) {
    var a=Math.random()*6.28, s=rnd(2,7+lv);
    sparks.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,dec:rnd(0.02,0.048),r:rnd(2,5),
      col:pal[Math.floor(Math.random()*pal.length)]});
  }
  sparks.push({x:x,y:y,ring:true,r:4,life:1,dec:0.032,col:pal[0]});
}

function addHitSpark(x,y) {
  for (var i=0; i<6; i++) {
    var a=Math.random()*6.28;
    sparks.push({x:x,y:y,vx:Math.cos(a)*rnd(1,3),vy:Math.sin(a)*rnd(1,3),
      life:0.7,dec:0.07,r:2,col:'#fff'});
  }
}

// ================================================================
//  GAME LOGIC
// ================================================================
function hitEnemy(en) {
  en.blinkT=0.1;
  addHitSpark(en.x, en.y);
  en.hp--;
  if (en.hp <= 0) {
    if (en.st==='n') { en.st='i'; en.ignT=0.25; en.hp=0; }
    else if (en.st==='i') { doExplode(en); }
  } else {
    // HPが残っている場合は点火状態にしない（ダメージのみ）
    if (en.st==='n') en.st='n'; // stay normal, show damage
  }
}

function doExplode(en) {
  if (en.st==='x'||en.st==='d') return;
  en.st='x'; en.xplT=0.42;
  turnKills++;
  chainCnt++;
  score+=Math.floor(10*Math.pow(chainCnt,1.3)*scoreMul);
  if (score>bestScore) bestScore=score;
  updateHUD();
  domChain.textContent=chainCnt+' CHAIN';
  domChain.style.color=chainCnt>=8?'#f00':chainCnt>=5?'#f70':'#fb0';
  if (chainCnt>=5) shakeT=0.25;
  addExplosion(en.x,en.y,en.lv,en.type);

  var effExplR = en.explR + en.oil * OIL_BOOST;
  for (var i=0; i<enemies.length; i++) {
    var o=enemies[i];
    if (o===en||o.st==='x'||o.st==='d') continue;
    if (dst(en.x,en.y,o.x,o.y) > effExplR+o.r) continue;
    if (o.st==='i') { o.ignT=0.03; }
    else {
      o.st='i'; o.lv=en.lv+1;
      o.ignT=0.25*Math.pow(0.9,o.lv);
    }
  }
  // アイテムが誘爆範囲内なら取得
  for (var i=0; i<items.length; i++) {
    var it=items[i];
    if (it.st!=='n') continue;
    if (dst(en.x,en.y,it.x,it.y) <= effExplR+it.r) destroyItem(it);
  }
}

function destroyItem(it) {
  if (it.st!=='n') return;
  it.st='x'; it.xplT=0.5;
  addExplosion(it.x, it.y, 0, 'item');
  openSelectWindow(it.x, it.y);
}

function anyActive() {
  for (var i=0; i<enemies.length; i++) {
    if (enemies[i].st==='i'||enemies[i].st==='x') return true;
  }
  return false;
}

// ================================================================
//  MAIN LOOP
// ================================================================
var lastTs=0;
function loop(ts) {
  var dt=Math.min((ts-lastTs)/1000, 0.05);
  lastTs=ts;
  update(dt); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt) {
  // sparks
  for (var i=sparks.length-1; i>=0; i--) {
    var sp=sparks[i];
    if (sp.ring) { sp.r+=(sp.maxR||80-sp.r)*0.14; }
    else { sp.x+=sp.vx;sp.y+=sp.vy;sp.vy+=0.15;sp.vx*=0.96; }
    sp.life-=sp.dec;
    if (sp.life<=0) sparks.splice(i,1);
  }
  if (shakeT>0) shakeT-=dt;
  if (playerAnim.shooting) {
    playerAnim.shotT+=dt;
    if (playerAnim.shotT>0.3) playerAnim.shooting=false;
  }
  // float texts（フェーズ問わず更新）
  for (var i=floatTexts.length-1; i>=0; i--) {
    floatTexts[i].y -= 60*dt;
    floatTexts[i].life -= dt*0.8;
    if (floatTexts[i].life<=0) floatTexts.splice(i,1);
  }
  if (phase==='over'||phase==='clear'||phase==='select') return;

  // DROP
  if (phase==='drop') {
    dropT+=dt;
    var prog=Math.min(dropT/DROP_SEC,1);
    var ease=1-Math.pow(1-prog,3);
    for (var i=0; i<dropList.length; i++) {
      var tg=dropList[i];
      tg.en.y=tg.y0+(tg.y1-tg.y0)*ease;
    }
    if (prog>=1) {
      for (var i=0; i<dropList.length; i++) {
        dropList[i].en.y=dropList[i].y1;
        dropList[i].en.row=dropList[i].row1;
      }
      dropList=[];
      if (checkGameOver()) { if(score>bestScore)bestScore=score; updateHUD(); phase='over'; return; }
      penaltyActive = penaltyNextTurn;
      curBounces = penaltyActive ? 1 : MAX_BOUNCES;
      penaltyNextTurn = false;
      turnKills = 0;
      turnStartScore = score;
      updateHUD();
      phase='aim'; setMsg('引っ張って離すと発射');
    }
    return;
  }

  // BULLET
  if (phase==='bullet' && bul) {
    bul.x+=bul.vx; bul.y+=bul.vy;
    if (bul.x-bul.r<0)  {bul.x=bul.r;     bul.vx= Math.abs(bul.vx); bul.wallHits++;}
    if (bul.x+bul.r>W)  {bul.x=W-bul.r;   bul.vx=-Math.abs(bul.vx); bul.wallHits++;}
    if (bul.y-bul.r<0)  {bul.y=bul.r;     bul.vy= Math.abs(bul.vy); bul.wallHits++;}
    if (bul.y+bul.r>H)  {bul.y=H-bul.r;   bul.vy=-Math.abs(bul.vy); bul.wallHits++;}
    if (bul.wallHits>=curBounces) { bul=null; }
    else {
      for (var i=0; i<enemies.length; i++) {
        var en=enemies[i];
        if (en.st==='d'||en.st==='x') continue;
        var bd=dst(bul.x,bul.y,en.x,en.y);
        if (en.hitCool<=0 && bd<bul.r+en.r) {
          // 直撃
          if (bul.type==='oil') {
            en.oil = Math.min(en.oil+1, OIL_MAX);
          } else {
            hitEnemy(en);
          }
          en.hitCool=0.15;
          var nx=bul.x-en.x,ny=bul.y-en.y,nd=Math.hypot(nx,ny)||1;
          nx/=nd;ny/=nd;
          var dot=bul.vx*nx+bul.vy*ny;
          bul.vx-=2*dot*nx; bul.vy-=2*dot*ny;
        } else if (bul.type==='oil' && en.oilCool<=0 && bd<OIL_R) {
          // オイル弾が近くを通過
          en.oil = Math.min(en.oil+1, OIL_MAX);
          en.oilCool = 0.25;
        }
      }
      if (Math.hypot(bul.vx,bul.vy)<0.4) bul=null;
    }
    if (!bul) phase='chain';
  }

  // update enemy timers
  for (var i=0; i<enemies.length; i++) {
    var en=enemies[i];
    en.pt+=dt*3.5;
    if (en.hitCool>0) en.hitCool-=dt;
    if (en.oilCool>0) en.oilCool-=dt;
    if (en.blinkT>0) en.blinkT-=dt;
    if (en.st==='i') { en.ignT-=dt; if(en.ignT<=0) doExplode(en); }
    if (en.st==='x') { en.xplT-=dt; if(en.xplT<=0) en.st='d'; }
  }
  // update item timers
  for (var i=0; i<items.length; i++) {
    var it=items[i];
    it.pt+=dt*2;
    if (it.st==='x') { it.xplT-=dt; if(it.xplT<=0) it.st='d'; }
  }

  // CHAIN end
  if (phase==='chain') {
    if (!anyActive()) endTurn();
  }
}

function openSelectWindow(x, y) {
  // pick 2 distinct effects
  var a = ITEM_EFFECTS[Math.floor(Math.random()*ITEM_EFFECTS.length)];
  var b;
  do { b = ITEM_EFFECTS[Math.floor(Math.random()*ITEM_EFFECTS.length)]; } while (b===a);
  selectOptions = [a, b];
  selectRects = null;
  prevPhase = phase;
  phase = 'select';
}

function applyEffect(id, x, y) {
  var txt;
  if (id==='aim') {
    AIM_STEPS += 5;
    txt = 'ガイド延長 +5';
  } else if (id==='bounce') {
    MAX_BOUNCES += 1;
    if (!penaltyActive) curBounces = MAX_BOUNCES;
    txt = '反射回数 +1';
  } else if (id==='explr') {
    EXPL_R_MULT = Math.round((EXPL_R_MULT + 0.1) * 100) / 100;
    txt = '誘爆範囲 +0.1';
  } else {
    scoreMul = Math.round((scoreMul + 0.2) * 10) / 10;
    txt = 'スコア倍率 +0.2';
  }
  updateHUD();
  floatTexts.push({x:x, y:y-20, text:txt, life:1});
}

function checkShotBtn(mx, my) {
  if (phase !== 'aim') return false;
  var fb=SHOT_BTNS.fire, ob=SHOT_BTNS.oil;
  if (mx>=fb.x && mx<=fb.x+fb.w && my>=fb.y && my<=fb.y+fb.h) { shotType='fire'; return true; }
  if (mx>=ob.x && mx<=ob.x+ob.w && my>=ob.y && my<=ob.y+ob.h) { shotType='oil';  return true; }
  return false;
}

function handleSelectClick(mx, my) {
  if (!selectRects || !selectOptions) return;
  for (var i=0; i<selectRects.length; i++) {
    var r = selectRects[i];
    if (mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h) {
      applyEffect(selectOptions[i], W/2, H/2);
      selectOptions=null; selectRects=null;
      if (bul) phase='bullet';
      else phase='chain';
      return;
    }
  }
}

// プレイヤーキャラ
var PLAYER_W = 56, PLAYER_H = 56;
function drawPlayer(cx, cy) {
  var shooting = playerAnim.shooting;
  var lean = shooting ? -8 : 0;

  CX.save();
  CX.translate(cx + lean, cy);

  // 影
  CX.fillStyle='rgba(0,0,0,0.3)';
  CX.beginPath(); CX.ellipse(0, PLAYER_H/2-4, PLAYER_W*0.4, 5, 0, 0, Math.PI*2); CX.fill();

  // player.png を中央揃えで描画
  if (playerImg.complete && playerImg.naturalWidth) {
    CX.drawImage(playerImg, -PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);
  }

  // 射撃時のフラッシュ
  if (shooting) {
    var t = playerAnim.shotT / 0.3;
    CX.globalAlpha = 1 - t;
    CX.strokeStyle='#adf'; CX.lineWidth=2;
    CX.beginPath(); CX.arc(PLAYER_W/2, -8, 8*t, 0, Math.PI*2); CX.stroke();
    CX.globalAlpha=1;
  }

  CX.restore();
}

// 小型スライム
function drawEnemySmall(en) {
  var r=en.r, x=0, y=0;
  var bob = Math.sin(en.pt*2)*2;
  CX.save(); CX.translate(x, y+bob);

  // 体
  CX.shadowColor='#4df'; CX.shadowBlur=8;
  CX.fillStyle = en.blinkT>0 ? '#fff' : '#1a8a8a';
  CX.beginPath();
  CX.arc(0,-2,r,0,Math.PI*2); CX.fill();
  // ぷよぷよ下部
  CX.fillStyle = en.blinkT>0 ? '#fff' : '#1a6a6a';
  CX.beginPath();
  CX.ellipse(0,r-4,r,r*0.5,0,0,Math.PI); CX.fill();

  // 目
  CX.shadowBlur=0;
  CX.fillStyle='#fff';
  CX.beginPath(); CX.ellipse(-4,-3,3,4,0,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.ellipse(4,-3,3,4,0,0,Math.PI*2); CX.fill();
  CX.fillStyle='#012';
  CX.beginPath(); CX.ellipse(-3,-3,2,3,0,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.ellipse(5,-3,2,3,0,0,Math.PI*2); CX.fill();
  CX.fillStyle='#fff';
  CX.beginPath(); CX.arc(-2,-2,0.8,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.arc(6,-2,0.8,0,Math.PI*2); CX.fill();

  // 口（怒り顔）
  CX.strokeStyle='#012'; CX.lineWidth=1.2;
  CX.beginPath(); CX.arc(0,3,3,0.2,Math.PI-0.2,true); CX.stroke();
  // 眉毛（怒り）
  CX.strokeStyle='#012'; CX.lineWidth=1.5;
  CX.beginPath(); CX.moveTo(-6,-7); CX.lineTo(-2,-6); CX.stroke();
  CX.beginPath(); CX.moveTo(6,-7); CX.lineTo(2,-6); CX.stroke();

  CX.restore();
}

// 中型モンスター
function drawEnemyMedium(en) {
  var r=en.r;
  var wobble = Math.sin(en.pt*1.5)*1.5;
  CX.save(); CX.translate(0, wobble);

  // 影
  CX.fillStyle='rgba(0,0,0,0.2)';
  CX.beginPath(); CX.ellipse(0,r+2,r*0.8,4,0,0,Math.PI*2); CX.fill();

  // 体
  CX.shadowColor='#e85'; CX.shadowBlur=10;
  CX.fillStyle = en.blinkT>0 ? '#fff' : '#c04010';
  CX.beginPath(); CX.arc(0,0,r,0,Math.PI*2); CX.fill();

  // お腹
  CX.fillStyle = en.blinkT>0 ? '#fdd' : '#e86030';
  CX.beginPath(); CX.ellipse(0,3,r*0.6,r*0.5,0,0,Math.PI*2); CX.fill();

  CX.shadowBlur=0;

  // 角（2本）
  CX.fillStyle='#8a2000';
  CX.save(); CX.translate(-7,-r+2);
  CX.beginPath(); CX.moveTo(0,0); CX.lineTo(-3,-10); CX.lineTo(3,-8); CX.closePath(); CX.fill();
  CX.restore();
  CX.save(); CX.translate(7,-r+2);
  CX.beginPath(); CX.moveTo(0,0); CX.lineTo(-3,-8); CX.lineTo(3,-10); CX.closePath(); CX.fill();
  CX.restore();

  // 目（つり目）
  CX.fillStyle='#ff0';
  CX.beginPath(); CX.ellipse(-6,-3,4,5,0,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.ellipse(6,-3,4,5,0,0,Math.PI*2); CX.fill();
  CX.fillStyle='#200';
  CX.beginPath(); CX.ellipse(-5,-3,2.5,3.5,0,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.ellipse(7,-3,2.5,3.5,0,0,Math.PI*2); CX.fill();

  // 口（牙あり）
  CX.fillStyle='#300'; CX.strokeStyle='#300'; CX.lineWidth=1;
  CX.beginPath(); CX.arc(0,5,5,0.1,Math.PI-0.1); CX.fill();
  // 牙
  CX.fillStyle='#fff';
  CX.beginPath(); CX.moveTo(-3,5); CX.lineTo(-2,10); CX.lineTo(-1,5); CX.closePath(); CX.fill();
  CX.beginPath(); CX.moveTo(1,5); CX.lineTo(2,10); CX.lineTo(3,5); CX.closePath(); CX.fill();

  // HP残り表示
  if (en.maxHp > 1) {
    for (var h=0; h<en.maxHp; h++) {
      CX.fillStyle = h < en.hp ? '#f80' : '#333';
      CX.beginPath(); CX.arc(-6+h*6, r+8, 3, 0, Math.PI*2); CX.fill();
    }
  }

  CX.restore();
}

// 大型ボス
function drawEnemyLarge(en) {
  var r=en.r;
  var pulse = 1 + Math.sin(en.pt*1.2)*0.04;
  CX.save(); CX.scale(pulse, pulse);

  // オーラ
  CX.shadowColor='#c0f'; CX.shadowBlur=20;
  var grd = CX.createRadialGradient(0,0,r*0.3,0,0,r*1.4);
  grd.addColorStop(0,'rgba(180,0,255,0.3)');
  grd.addColorStop(1,'rgba(180,0,255,0)');
  CX.fillStyle=grd;
  CX.beginPath(); CX.arc(0,0,r*1.4,0,Math.PI*2); CX.fill();

  // 体
  CX.fillStyle = en.blinkT>0 ? '#fff' : '#5a1080';
  CX.beginPath(); CX.arc(0,0,r,0,Math.PI*2); CX.fill();

  // 模様（魔法陣風）
  CX.shadowBlur=0;
  CX.strokeStyle='rgba(200,100,255,0.5)'; CX.lineWidth=1.5;
  CX.beginPath(); CX.arc(0,0,r*0.7,0,Math.PI*2); CX.stroke();
  for (var k=0;k<6;k++) {
    var a=k/6*Math.PI*2;
    CX.beginPath();
    CX.moveTo(0,0);
    CX.lineTo(Math.cos(a+en.pt*0.3)*r*0.65, Math.sin(a+en.pt*0.3)*r*0.65);
    CX.stroke();
  }

  // 目（3つ）
  CX.fillStyle='#f0f';
  CX.beginPath(); CX.arc(-9,-4,5,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.arc(9,-4,5,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.arc(0,-8,4,0,Math.PI*2); CX.fill();
  CX.fillStyle='#fff';
  CX.beginPath(); CX.arc(-9,-4,2.5,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.arc(9,-4,2.5,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.arc(0,-8,2,0,Math.PI*2); CX.fill();

  // 口（大きく禍々しい）
  CX.fillStyle='#1a0020';
  CX.beginPath(); CX.arc(0,6,10,0,Math.PI); CX.fill();
  CX.fillStyle='#fff';
  for (var k=0;k<4;k++) {
    var tx = -9+k*6;
    CX.beginPath(); CX.moveTo(tx,6); CX.lineTo(tx+2,13); CX.lineTo(tx+4,6); CX.closePath(); CX.fill();
  }

  // HP残り表示
  if (en.maxHp > 1) {
    for (var h=0; h<en.maxHp; h++) {
      CX.fillStyle = h < en.hp ? '#d0f' : '#333';
      CX.beginPath(); CX.arc(-en.maxHp*5+h*10+5, r+10, 4, 0, Math.PI*2); CX.fill();
    }
  }

  CX.restore();
}

// オイルオーバーレイ
function drawOilOverlay(en) {
  if (en.oil<=0) return;
  var alpha = en.oil / OIL_MAX;
  CX.save();
  // ぬめり光
  CX.globalAlpha = alpha * 0.45;
  CX.shadowColor = '#f80'; CX.shadowBlur = 10;
  CX.fillStyle = '#c05000';
  CX.beginPath(); CX.arc(0,0,en.r+3,0,Math.PI*2); CX.fill();
  // オイル滴（スタック数分の点）
  CX.globalAlpha = 0.9;
  CX.shadowBlur = 0;
  for (var k=0;k<en.oil;k++) {
    var a = k/OIL_MAX*Math.PI*2 - Math.PI/2;
    CX.fillStyle = k===en.oil-1 ? '#ffa030' : '#c06000';
    CX.beginPath();
    CX.arc(Math.cos(a)*(en.r-3), Math.sin(a)*(en.r-3), 3.5, 0, Math.PI*2);
    CX.fill();
  }
  CX.globalAlpha=1; CX.restore();
}

// 点火中オーバーレイ
function drawIgniteOverlay(en) {
  var pulse=1+Math.sin(en.pt*4)*0.2;
  CX.save(); CX.scale(pulse,pulse);
  CX.globalAlpha=0.6;
  CX.strokeStyle='#f80'; CX.lineWidth=3;
  CX.shadowColor='#f80'; CX.shadowBlur=15;
  CX.beginPath(); CX.arc(0,0,en.r+4,0,Math.PI*2); CX.stroke();
  // 炎パーティクル風
  for (var k=0;k<4;k++) {
    var a=k/4*Math.PI*2+en.pt;
    var fx=Math.cos(a)*(en.r+2), fy=Math.sin(a)*(en.r+2);
    CX.fillStyle='#fb0';
    CX.beginPath(); CX.arc(fx,fy,3,0,Math.PI*2); CX.fill();
  }
  CX.globalAlpha=1; CX.restore();
}

// 爆発アニメ
function drawExploding(en) {
  var prog=Math.max(0,1-en.xplT/0.42);
  CX.save();
  CX.globalAlpha=Math.max(0,1-prog);
  CX.shadowColor='#f80'; CX.shadowBlur=30;
  var col = en.type==='s'?'#4df': en.type==='m'?'#f80':'#d0f';
  CX.fillStyle=col;
  CX.beginPath(); CX.arc(0,0,Math.max(1,en.r*(1+prog*2.5)),0,Math.PI*2); CX.fill();
  CX.restore();
}

// ================================================================
//  DRAW ITEM
// ================================================================
function drawItem(it) {
  var col = '#ff0';
  var pulse = 1 + Math.sin(it.pt*2)*0.1;
  var rot   = it.pt * 0.5;
  CX.save(); CX.translate(it.x, it.y);

  if (it.st==='x') {
    // 爆発アニメ
    var prog = Math.max(0, 1 - it.xplT/0.5);
    CX.globalAlpha = Math.max(0, 1-prog);
    CX.shadowColor='#ff0'; CX.shadowBlur=30;
    CX.fillStyle='#ff0';
    CX.beginPath(); CX.arc(0,0,Math.max(1,it.r*(1+prog*2)),0,Math.PI*2); CX.fill();
    CX.restore(); return;
  }

  CX.rotate(rot);
  CX.scale(pulse, pulse);

  // 外枠（直接攻撃無効の盾表現）
  CX.shadowColor=col; CX.shadowBlur=12;
  CX.strokeStyle=col; CX.lineWidth=2;
  CX.beginPath(); CX.arc(0,0,it.r+3,0,Math.PI*2); CX.stroke();

  // ダイヤ形
  CX.fillStyle=col;
  CX.beginPath();
  CX.moveTo(0,-11); CX.lineTo(9,0); CX.lineTo(0,11); CX.lineTo(-9,0);
  CX.closePath(); CX.fill();

  // ハイライト
  CX.fillStyle='rgba(255,255,255,0.45)';
  CX.beginPath();
  CX.moveTo(0,-7); CX.lineTo(4,-1); CX.lineTo(0,2); CX.lineTo(-4,-1);
  CX.closePath(); CX.fill();

  // ラベル（回転打ち消し）
  CX.shadowBlur=0;
  CX.rotate(-rot);
  CX.scale(1/pulse, 1/pulse);
  CX.fillStyle='#fff'; CX.font='bold 7px monospace'; CX.textAlign='center';
  CX.fillText('ITEM', 0, 3);

  CX.restore();
}

// ================================================================
//  DRAW BULLET
// ================================================================
function drawBullet(b) {
  var isOil = b.type==='oil';
  var c1 = isOil ? '#fff'                  : '#fff';
  var c2 = isOil ? '#d06010'               : '#8cf';
  var c3 = isOil ? 'rgba(200,90,0,0)'      : 'rgba(100,200,255,0)';
  var sc = isOil ? '#f80'                  : '#adf';
  CX.save();
  CX.shadowColor=sc; CX.shadowBlur=16;
  var grd=CX.createRadialGradient(b.x-2,b.y-2,1,b.x,b.y,b.r*1.5);
  grd.addColorStop(0,c1); grd.addColorStop(0.4,c2); grd.addColorStop(1,c3);
  CX.fillStyle=grd;
  CX.beginPath(); CX.arc(b.x,b.y,b.r*1.5,0,Math.PI*2); CX.fill();
  CX.fillStyle='#fff';
  CX.beginPath(); CX.arc(b.x,b.y,b.r*0.6,0,Math.PI*2); CX.fill();
  CX.globalAlpha=0.3;
  CX.fillStyle=c2;
  CX.beginPath(); CX.arc(b.x-b.vx*2,b.y-b.vy*2,b.r*0.8,0,Math.PI*2); CX.fill();
  CX.beginPath(); CX.arc(b.x-b.vx*4,b.y-b.vy*4,b.r*0.5,0,Math.PI*2); CX.fill();
  CX.restore();
}

// ================================================================
//  MAIN DRAW
// ================================================================
function draw() {
  CX.save();
  if (shakeT>0) CX.translate((Math.random()-0.5)*shakeT*12,(Math.random()-0.5)*shakeT*12);

  // BG グラデーション
  var bg=CX.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d0d20'); bg.addColorStop(1,'#0a0a10');
  CX.fillStyle=bg; CX.fillRect(0,0,W,H);

  // 背景の星
  CX.fillStyle='rgba(255,255,255,0.4)';
  for (var s=0;s<30;s++) {
    var sx=((s*137+wave*13)%W), sy=((s*97+wave*7)%FLOOR_Y);
    CX.beginPath(); CX.arc(sx,sy,0.8,0,Math.PI*2); CX.fill();
  }

  // グリッド（薄く）
  CX.strokeStyle='rgba(255,255,255,0.02)'; CX.lineWidth=1;
  for (var gy=30;gy<=FLOOR_Y;gy+=ROW_H) {
    CX.beginPath(); CX.moveTo(0,gy); CX.lineTo(W,gy); CX.stroke();
  }

  // ゲームオーバーライン
  var flY=rowY(FLOOR_ROW)+26;
  CX.save();
  var da=0.5+Math.sin(Date.now()/300)*0.3;
  CX.strokeStyle='rgba(255,40,0,'+da+')'; CX.lineWidth=2; CX.setLineDash([8,5]);
  CX.beginPath(); CX.moveTo(0,flY); CX.lineTo(W,flY); CX.stroke();
  CX.setLineDash([]);
  CX.fillStyle='rgba(255,40,0,0.55)'; CX.font='10px monospace'; CX.textAlign='right';
  CX.fillText('GAME OVER LINE',W-6,flY-4);
  CX.restore();

  // 地面
  var gndGrd=CX.createLinearGradient(0,flY,0,H);
  gndGrd.addColorStop(0,'#1a1a2a'); gndGrd.addColorStop(1,'#0d0d18');
  CX.fillStyle=gndGrd; CX.fillRect(0,flY,W,H-flY);

  // sparks
  for (var i=0;i<sparks.length;i++) {
    var sp=sparks[i];
    if (sp.life<=0) continue;
    if (sp.ring) {
      CX.globalAlpha=sp.life*0.4;
      CX.strokeStyle=sp.col||'#f70'; CX.lineWidth=2;
      CX.beginPath(); CX.arc(sp.x,sp.y,Math.max(1,sp.r),0,6.28); CX.stroke();
    } else {
      CX.globalAlpha=sp.life;
      CX.fillStyle=sp.col;
      CX.beginPath(); CX.arc(sp.x,sp.y,Math.max(0.3,sp.r*sp.life),0,6.28); CX.fill();
    }
  }
  CX.globalAlpha=1;

  // 敵を描画
  for (var i=0;i<enemies.length;i++) {
    var en=enemies[i];
    if (en.st==='d') continue;
    CX.save(); CX.translate(en.x, en.y);

    if (en.st==='x') {
      drawExploding(en);
    } else {
      // キャラ描画
      if (en.type==='s') drawEnemySmall(en);
      else if (en.type==='m') drawEnemyMedium(en);
      else drawEnemyLarge(en);

      // オイルオーバーレイ
      if (en.oil>0) drawOilOverlay(en);
      // 点火オーバーレイ
      if (en.st==='i') drawIgniteOverlay(en);
    }
    CX.restore();
  }

  // アイテム
  for (var i=0;i<items.length;i++) {
    if (items[i].st!=='d') drawItem(items[i]);
  }

  // 弾
  if (bul) drawBullet(bul);

  // エイムライン
  if (phase==='aim' && mouse.dn) {
    var BX = LX, BY = LY - 28;
    var ang = aimAngleFromX(mouse.x);
    var r = 70;
    var px = BX + Math.cos(ang)*r;
    var py = BY - Math.sin(ang)*r;
    var aimCol = shotType==='oil' ? '200,120,0' : '150,220,255';
    CX.save();
    CX.strokeStyle='rgba('+aimCol+',0.4)';
    CX.lineWidth=1.6;
    CX.beginPath(); CX.arc(BX, BY, r, Math.PI, 0); CX.stroke();
    CX.strokeStyle='rgba('+aimCol+',0.65)';
    CX.beginPath(); CX.moveTo(BX,BY); CX.lineTo(px,py); CX.stroke();
    CX.fillStyle='rgba('+aimCol+',0.9)';
    CX.beginPath(); CX.arc(px,py,4,0,Math.PI*2); CX.fill();
    var sx=BX, sy=BY;
    var svx=Math.cos(ang)*12, svy=-Math.sin(ang)*12;
    CX.setLineDash([5,8]);
    CX.strokeStyle='rgba('+aimCol+',0.35)';
    CX.lineWidth=1.5; CX.beginPath();
    CX.moveTo(sx,sy);
    for (var k=0;k<AIM_STEPS;k++) {
      sx+=svx;sy+=svy;
      if(sx<BR){sx=BR;svx=Math.abs(svx);}
      if(sx>W-BR){sx=W-BR;svx=-Math.abs(svx);}
      if(sy<BR){sy=BR;svy=Math.abs(svy);}
      if(sy>H-BR){sy=H-BR;svy=-Math.abs(svy);}
      CX.lineTo(sx,sy);
    }
    CX.stroke();
    CX.restore();
  }

  // 弾種切替ボタン（AIMフェーズ）
  if (phase==='aim') {
    var btns = [{key:'fire', label:'🔥 FIRE', col:'#f64'}, {key:'oil', label:'💧 OIL', col:'#f80'}];
    CX.save();
    for (var i=0;i<2;i++) {
      var b=SHOT_BTNS[btns[i].key];
      var sel=shotType===btns[i].key;
      CX.fillStyle = sel ? btns[i].col : 'rgba(20,20,30,0.7)';
      CX.shadowColor = sel ? btns[i].col : 'transparent';
      CX.shadowBlur  = sel ? 10 : 0;
      CX.fillRect(b.x, b.y, b.w, b.h);
      CX.strokeStyle = sel ? btns[i].col : 'rgba(255,255,255,0.2)';
      CX.lineWidth=1.5; CX.strokeRect(b.x, b.y, b.w, b.h);
      CX.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.5)';
      CX.font = 'bold 11px monospace'; CX.textAlign='center'; CX.shadowBlur=0;
      CX.fillText(btns[i].label, b.x+b.w/2, b.y+13);
    }
    CX.restore();
  }

  // プレイヤーキャラ
  drawPlayer(LX, LY);

  // フェーズラベル
  var lbl={drop:'↓ DROP',aim:'► AIM',bullet:'◉ SHOT',chain:'💥 CHAIN'};
  CX.textAlign='left'; CX.font='11px monospace';
  CX.fillStyle='rgba(255,255,255,0.22)';
  CX.fillText(lbl[phase]||'', 6, 16);

  // WAVEプログレスバー
  var bw=W*(wave/MAX_WAVE);
  CX.fillStyle='rgba(255,120,0,0.12)'; CX.fillRect(0,0,bw,3);
  CX.fillStyle='rgba(255,120,0,0.45)'; CX.fillRect(0,0,bw,1);


  // アイテム取得テキスト（最前面）
  if (floatTexts.length) {
    CX.save();
    CX.textAlign='center'; CX.font='bold 17px monospace';
    for (var i=0;i<floatTexts.length;i++) {
      var ft=floatTexts[i];
      CX.globalAlpha=ft.life;
      CX.shadowColor='#f80'; CX.shadowBlur=14;
      CX.fillStyle='#ff0';
      CX.fillText('★ '+ft.text, ft.x, ft.y);
      CX.shadowBlur=0;
      CX.fillStyle='rgba(0,0,0,0.5)';
      CX.fillText('★ '+ft.text, ft.x+1, ft.y+1);
    }
    CX.globalAlpha=1; CX.restore();
  }

  // GAME OVER
  if (phase==='over') {
    CX.fillStyle='rgba(0,0,0,0.78)'; CX.fillRect(0,0,W,H);
    CX.textAlign='center';
    CX.shadowColor='#f00'; CX.shadowBlur=28;
    CX.fillStyle='#f44'; CX.font='bold 32px monospace';
    CX.fillText('GAME OVER',W/2,H/2-30);
    CX.shadowBlur=0;
    CX.fillStyle='#fff'; CX.font='18px monospace';
    CX.fillText('SCORE: '+score,W/2,H/2+8);
    CX.fillStyle='#888'; CX.font='14px monospace';
    CX.fillText('WAVE: '+(wave-1)+' / '+MAX_WAVE,W/2,H/2+34);
    CX.fillStyle='#555'; CX.font='12px monospace';
    CX.fillText('クリックでリスタート',W/2,H/2+60);
  }

  // GAME CLEAR
  if (phase==='clear') {
    CX.fillStyle='rgba(0,0,0,0.78)'; CX.fillRect(0,0,W,H);
    CX.textAlign='center';
    var glow=0.7+Math.sin(Date.now()/300)*0.3;
    CX.shadowColor='#ff0'; CX.shadowBlur=30*glow;
    CX.fillStyle='#ff0'; CX.font='bold 32px monospace';
    CX.fillText('GAME CLEAR!',W/2,H/2-30);
    CX.shadowBlur=0;
    CX.fillStyle='#fff'; CX.font='18px monospace';
    CX.fillText('SCORE: '+score,W/2,H/2+8);
    CX.fillStyle='#888'; CX.font='14px monospace';
    CX.fillText('ALL '+MAX_WAVE+' WAVES CLEARED',W/2,H/2+36);
    CX.fillStyle='#555'; CX.font='12px monospace';
    CX.fillText('クリックでリスタート',W/2,H/2+62);
  }

  // SELECT WINDOW
  if (phase==='select' && selectOptions) {
    CX.fillStyle='rgba(0,0,0,0.78)'; CX.fillRect(0,0,W,H);
    CX.textAlign='center';
    CX.fillStyle='#ff0'; CX.font='bold 20px monospace';
    CX.fillText('CHOOSE ONE', W/2, H/2-90);

    var pad=16;
    var gap=Math.min(18, Math.max(10, (W-2*pad)*0.08));
    var cardW=Math.min(180, (W - pad*2 - gap) / 2);
    var cardH=90;
    var leftX=W/2-cardW-gap/2, rightX=W/2+gap/2;
    var y=H/2-40;
    var rects=[
      {x:leftX, y:y, w:cardW, h:cardH},
      {x:rightX, y:y, w:cardW, h:cardH}
    ];
    selectRects = rects;

    for (var i=0;i<2;i++) {
      var id=selectOptions[i];
      var title = id==='aim'?'AIM GUIDE +5'
                : id==='bounce'?'BOUNCE +1'
                : id==='explr'?'BLAST RANGE +0.1'
                : 'SCORE MULT +0.2';
      var sub = id==='aim'?'ガイドライン延長'
              : id==='bounce'?'反射回数増加'
              : id==='explr'?'誘爆範囲拡大'
              : 'スコア倍率上昇';
      CX.fillStyle='rgba(20,20,30,0.9)'; CX.fillRect(rects[i].x, rects[i].y, rects[i].w, rects[i].h);
      CX.strokeStyle='#ff0'; CX.lineWidth=2; CX.strokeRect(rects[i].x, rects[i].y, rects[i].w, rects[i].h);
      CX.fillStyle='#fff'; CX.font='bold 14px monospace';
      CX.fillText(title, rects[i].x+rects[i].w/2, rects[i].y+36);
      CX.fillStyle='rgba(255,255,255,0.6)'; CX.font='11px monospace';
      CX.fillText(sub, rects[i].x+rects[i].w/2, rects[i].y+60);
    }
    CX.fillStyle='rgba(255,255,255,0.4)'; CX.font='11px monospace';
    CX.fillText('クリックで選択', W/2, H/2+70);
  }

  CX.restore();
}

// ================================================================
//  START
// ================================================================
init();
</script>
</body>
</html>
